name: Deploy Markdowner to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
            FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
            FIREBASE_DB_URL:     ${{ secrets.FIREBASE_DB_URL }}
            FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
            sed -i "s|__FIREBASE_API_KEY__|${FIREBASE_API_KEY}|g"       index.html
            sed -i "s|__FIREBASE_DB_URL__|${FIREBASE_DB_URL}|g"         index.html
            sed -i "s|__FIREBASE_PROJECT_ID__|${FIREBASE_PROJECT_ID}|g" index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4